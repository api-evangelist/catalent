specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Catalent
providerId: catalent
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Pharmaceutical Services
  - Drug Delivery
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps scaffold for Catalent. Catalent invoices are project / MSA-driven CDMO
  service fees rather than per-API-call charges; meters track integration usage but the dominant cost
  line is the underlying contract.'
notes: Cost surface is contract-driven, not API-priced. Meters reflect integration telemetry useful for
  partner monitoring, not invoice line items.
sources:
  - https://www.catalent.com
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Catalent, Inc.
serviceCategory: Pharmaceutical Services
billingModel:
  pricingCategory: Custom (MSA / Project)
  billingFrequency: Per-Milestone
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Catalent CDMO Services
  ServiceCategory: Pharmaceutical Services
  ProviderName: Catalent
  PublisherName: Catalent, Inc.
  InvoiceIssuerName: Catalent, Inc.
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - customer
  - name: project_milestones_invoiced
    unit: milestone
    aggregation: count
    dimensions:
      - project
      - service_line
principles:
  - name: Visibility
    description: Track Catalent project spend through the MSA-defined reporting; integration call counts
      provide a secondary signal of system load, not cost.
  - name: Allocation
    description: Allocate Catalent fees to the originating drug program / project; tag integration calls
      with the program identifier.
  - name: Optimization
    description: Use scope changes, milestone restructuring, and supplier consolidation rather than per-call
      tuning to reduce CDMO spend.
  - name: Accountability
    description: A program / supply-chain owner reconciles Catalent invoices against the MSA; IT owns
      the integration uptime SLA.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
